name: 毎朝7時 Push通知送信

on:
  schedule:
    - cron: '30 20 * * *'  # UTC 20:30 = JST 05:30（遅延見込み）
  workflow_dispatch:         # 手動テスト用

jobs:
  send-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: cd scripts && npm install --silent

      - name: マーケットデータ取得・Firestore保存
        continue-on-error: true
        run: node scripts/fetch-market.mjs
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}

      - name: テスト用Firestoreシード（テスト後削除）
        if: ${{ vars.SEED_TEST == 'true' }}
        run: node scripts/test-seed.mjs
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: 通知送信
        run: node scripts/send-notify.mjs
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY:      ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
